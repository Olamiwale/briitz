name: Backend CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
      image_tag:
        description: "Docker image tag (e.g., commit SHA)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://your-account-service-url.com

    env:
      REGISTRY: depaulacr.azurecr.io
      RESOURCE_GROUP: briitz_rg
      CLUSTER_NAME: briitzaks
      SERVICE: account-service
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      ENV: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download deployment files
      uses: actions/download-artifact@v3
      with:
        name: k8s-manifests
        path: ./k8s-temp/ 

    - name: Azure Login (OIDC)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: ACR Login
      run: az acr login --name briitzacr

    - name: Set AKS Context
      run: |
        az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --overwrite-existing

    - name: Inject image tag into Kubernetes manifest
      run: |
        sed -i "s|REPLACE_IMAGE|$REGISTRY/$SERVICE:$IMAGE_TAG|g" ./k8s-temp/deployment.yaml

    - name: Deploy to AKS
      run: |
        kubectl apply -f ./k8s-temp/deployment.yaml
        kubectl apply -f ./k8s-temp/service.yaml
