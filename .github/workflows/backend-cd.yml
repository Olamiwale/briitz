name: Backend CD

on:
  push:
    branches: ['main'] 

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      REGISTRY: depaulacr.azurecr.io
      RESOURCE_GROUP: briitz_rg
      CLUSTER_NAME: briitzaks
      SERVICE: account-service
      IMAGE_TAG: ${{ github.sha }}
      ENV: dev

    steps:
    
    - name: Azure Login (OIDC)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: ACR Login
      run: az acr login --name briitzacr
 
    - name: Set AKS Context
      run: |
        az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --overwrite-existing

    - name: Inject image tag into Kubernetes manifest
      run: |
        sed -i "s|REPLACE_IMAGE|$REGISTRY/$SERVICE:${{ env.IMAGE_TAG }}|g" ./k8s-temp/deployment.yaml

    - name: Deploy to AKS
      run: |
        kubectl apply -f ./k8s-temp/deployment.yaml
        kubectl apply -f ./k8s-temp/service.yaml
